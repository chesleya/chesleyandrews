<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chesley Andrews</title>
  <meta name="description" content="Chesley Andrews — designer, community builder, and founder." />
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><circle cx='50' cy='50' r='50' fill='%23F2EAE6'/><text x='50' y='56' font-family='Georgia,serif' font-size='32' fill='%232C2520' text-anchor='middle' dominant-baseline='middle'>CA</text></svg>" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;1,400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #FFF0F3;
      --ink: #2A0A12;
      --link: #C4003A;
    }

    body {
      background-color: var(--bg);
      color: var(--ink);
      font-family: 'Lora', Georgia, serif;
      font-weight: 400;
      font-size: 1.25rem;
      line-height: 1.75;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      min-height: 100vh;
      padding: 25vh 1.5rem 3rem;
      transition: background-color 0.4s ease;
    }

    body.hover-betterment { background-color: #FFD6E0; }
    body.hover-etsy       { background-color: #FFB3C6; }
    body.hover-athletics  { background-color: #FADADD; }
    body.hover-email      { background-color: #FFE4EC; }
    body.hover-linkedin   { background-color: #FFC8D4; }

    main {
      max-width: 480px;
      width: 100%;
      text-align: center;
    }

    p { margin-bottom: 1.1rem; }

    a {
      color: var(--link);
      text-decoration: none;
    }

    a:hover {
      text-decoration: underline;
      text-underline-offset: 3px;
    }

    .available { margin-bottom: 1.6rem; }

    nav {
      display: flex;
      gap: 1.25rem;
      justify-content: center;
      flex-wrap: wrap;
    }

    @media (max-width: 480px) {
      body { padding: 2rem 1.25rem; font-size: 1.15rem; }
      p { margin-bottom: 0.85rem; }
      .available { margin-bottom: 1.1rem; }
    }
  </style>
</head>
<body>
  <main>
    <p>Hello!</p>
    <p>
      I'm Chesley, currently a Senior Product Design Director at <a href="https://www.betterment.com/" target="_blank" rel="noopener" data-hover="betterment">Betterment</a>.
      In the past I was a designer at <a href="https://www.etsy.com/" target="_blank" rel="noopener" data-hover="etsy">Etsy</a>,
      <a href="https://athleticsnyc.com/" target="_blank" rel="noopener" data-hover="athletics">Athletics</a>,
      and ran my own design studio.
    </p>
    <p class="available">I am available for select graphic design projects.</p>
    <p>Get in touch via <a href="mailto:Chesley.andrews@gmail.com" data-hover="email">Email</a> or <a href="https://www.linkedin.com/in/chesley-andrews" target="_blank" rel="noopener" data-hover="linkedin">LinkedIn</a>.</p>
  </main>
  <script>
    document.querySelectorAll('a[data-hover]').forEach(link => {
      link.addEventListener('mouseenter', () => {
        document.body.className = 'hover-' + link.dataset.hover;
      });
      link.addEventListener('mouseleave', () => {
        document.body.className = '';
      });
    });
  </script>
</body>
</html>
